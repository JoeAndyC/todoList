<!DOCTYPE html>
<html>
    <head>
        <title>To Do List</title>
        <meta charset="UTF -8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0 ">
        <link rel="stylesheet" href="./styles/styles.css" />
    </head>
    <body>
        <header>
            <h1>To Do List</h1>
        </header>
        <main>
            <section class="enterTask">
                <input type="text" id="task" placeholder="Ingrese una tarea">
                <button class="addTask">+</button>
            </section>

            <section class="taskLists">
              <ul class="taskList">
                <li>Comprar pan</li> 
                <input type="checkbox" name="checkDelete" >
                <button>Borrar</button>
            </section>
        </main>
        <footer></footer>
        <script src="./scripts/main.js"></script>
    </body>
</html>
